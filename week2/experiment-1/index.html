<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スライドショー</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .slideshow {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.12);
      padding: 32px;
      width: 680px;
      text-align: center;
    }

    .slide {
      display: none;
    }

    .slide.active {
      display: block;
    }

    .slide img {
      width: 100%;
      height: auto;
      border-radius: 8px;
    }

    .slide-caption {
      margin-top: 16px;
      font-size: 1.1em;
      color: #333;
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 24px;
      margin-top: 24px;
    }

    .btn {
      background: #333;
      color: white;
      border: none;
      padding: 10px 28px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95em;
      transition: background 0.2s;
    }

    .btn:hover {
      background: #555;
    }

    .btn:disabled {
      background: #bbb;
      cursor: not-allowed;
    }

    .counter {
      font-size: 0.95em;
      color: #666;
      min-width: 60px;
    }
  </style>
</head>
<body>

<div class="slideshow">

  <div class="slide active">
    <img src="https://placehold.jp/600x300.png" alt="スライド 1">
    <p class="slide-caption">スライド 1</p>
  </div>

  <div class="slide">
    <img src="https://placehold.jp/3d4070/ffffff/600x300.png?text=Slide+2" alt="スライド 2">
    <p class="slide-caption">スライド 2</p>
  </div>

  <div class="slide">
    <img src="https://placehold.jp/70503d/ffffff/600x300.png?text=Slide+3" alt="スライド 3">
    <p class="slide-caption">スライド 3</p>
  </div>

  <div class="slide">
    <img src="https://placehold.jp/3d7050/ffffff/600x300.png?text=Slide+4" alt="スライド 4">
    <p class="slide-caption">スライド 4</p>
  </div>

  <div class="slide">
    <img src="https://placehold.jp/703d50/ffffff/600x300.png?text=Slide+5" alt="スライド 5">
    <p class="slide-caption">スライド 5</p>
  </div>

  <div class="controls">
    <button class="btn" id="prevBtn" disabled>← 前へ</button>
    <span class="counter" id="counter">1 / 5</span>
    <button class="btn" id="nextBtn">次へ →</button>
  </div>

</div>

<script>
  const slides = document.querySelectorAll('.slide');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const counter = document.getElementById('counter');
  const total = slides.length;
  let current = 0;

  function goTo(n) {
    slides[current].classList.remove('active');
    current = n;
    slides[current].classList.add('active');
    counter.textContent = (current + 1) + ' / ' + total;
    prevBtn.disabled = current === 0;
    nextBtn.disabled = current === total - 1;
  }

  prevBtn.addEventListener('click', () => goTo(current - 1));
  nextBtn.addEventListener('click', () => goTo(current + 1));
</script>

</body>
</html>
