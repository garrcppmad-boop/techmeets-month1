<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プロフィール</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
    }

    .card {
      width: 400px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.12);
      padding: 40px 32px;
      text-align: center;
    }

    .card img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
    }

    .card h1 {
      margin-top: 16px;
      font-size: 1.4em;
      color: #1a1a1a;
    }

    .card p {
      margin-top: 8px;
      font-size: 0.95em;
      color: #666;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
    }

    .badge {
      background: #f0f0f8;
      color: #5a5a8a;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.82em;
      font-weight: 500;
    }
  </style>
</head>
<body>

<div class="card">
  <img src="https://placehold.jp/100x100.png" alt="アイコン">
  <h1>山田 太郎</h1>
  <p>Web開発が好きなエンジニア見習いです。</p>
  <div class="badges">
    <span class="badge">HTML</span>
    <span class="badge">CSS</span>
    <span class="badge">JavaScript</span>
  </div>
</div>

</body>
</html>
