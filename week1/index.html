<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDoリスト</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #f0f2f5;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
      min-height: 100vh;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 24px;
      letter-spacing: 0.02em;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #dde1e7;
      border-radius: 10px;
      font-size: 0.95rem;
      color: #333;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #5c6bc0;
    }

    .input-row button {
      padding: 10px 18px;
      background: #5c6bc0;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #3949ab;
    }

    #task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: #f8f9fb;
      border-radius: 10px;
      border: 1.5px solid #eaecf0;
      transition: opacity 0.2s;
    }

    .task-item.done {
      opacity: 0.55;
    }

    .task-label {
      flex: 1;
      font-size: 0.95rem;
      color: #333;
      cursor: pointer;
      user-select: none;
      word-break: break-all;
      transition: text-decoration 0.1s;
    }

    .task-item.done .task-label {
      text-decoration: line-through;
      color: #999;
    }

    .delete-btn {
      padding: 4px 10px;
      background: none;
      border: 1.5px solid #e0e0e0;
      border-radius: 7px;
      font-size: 0.8rem;
      color: #e57373;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      background: #ffeaea;
      border-color: #e57373;
    }

    .progress {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      font-size: 0.85rem;
      color: #888;
    }

    .progress-bar {
      flex: 1;
      height: 6px;
      background: #eaecf0;
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: #5c6bc0;
      border-radius: 99px;
      transition: width 0.3s ease;
    }

    .empty {
      text-align: center;
      color: #bbb;
      font-size: 0.9rem;
      padding: 24px 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>ToDoリスト</h1>
    <div class="progress" id="progress-area" style="display:none">
      <span id="progress-text"></span>
      <div class="progress-bar">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
    </div>
    <div class="input-row">
      <input type="text" id="task-input" placeholder="タスクを入力..." maxlength="100">
      <button onclick="addTask()">追加</button>
    </div>
    <ul id="task-list"></ul>
  </div>

  <script>
    const tasks = [];

    function render() {
      const list = document.getElementById('task-list');
      list.innerHTML = '';

      const total = tasks.length;
      const done = tasks.filter(t => t.done).length;
      const progressArea = document.getElementById('progress-area');
      if (total > 0) {
        progressArea.style.display = 'flex';
        document.getElementById('progress-text').textContent = `${done} / ${total} 完了`;
        document.getElementById('progress-fill').style.width = `${(done / total) * 100}%`;
      } else {
        progressArea.style.display = 'none';
      }

      if (tasks.length === 0) {
        list.innerHTML = '<p class="empty">タスクがありません</p>';
        return;
      }

      tasks.forEach((task, index) => {
        const li = document.createElement('li');
        li.className = 'task-item' + (task.done ? ' done' : '');

        const label = document.createElement('span');
        label.className = 'task-label';
        label.textContent = task.text;
        label.onclick = () => toggleTask(index);

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-btn';
        deleteBtn.textContent = '削除';
        deleteBtn.onclick = () => deleteTask(index);

        li.appendChild(label);
        li.appendChild(deleteBtn);
        list.appendChild(li);
      });
    }

    function addTask() {
      const input = document.getElementById('task-input');
      const text = input.value.trim();
      if (!text) return;

      tasks.push({ text, done: false });
      input.value = '';
      input.focus();
      render();
    }

    function toggleTask(index) {
      tasks[index].done = !tasks[index].done;
      render();
    }

    function deleteTask(index) {
      tasks.splice(index, 1);
      render();
    }

    document.getElementById('task-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addTask();
    });

    render();
  </script>
</body>
</html>
